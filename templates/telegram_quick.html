<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram 一键群发 - 多平台自动营销系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #229ED9 0%, #0088cc 100%); color: white; padding: 20px 0; margin-bottom: 20px; }
        header h1 { font-size: 24px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav a { padding: 10px 20px; background: white; color: #333; text-decoration: none; border-radius: 8px; font-weight: 500; }
        .nav a:hover, .nav a.active { background: #229ED9; color: white; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { font-size: 18px; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 12px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
        .form-group input:focus { border-color: #229ED9; outline: none; }
        .form-group textarea { min-height: 150px; resize: vertical; font-family: inherit; }
        .btn { display: inline-block; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-size: 14px; cursor: pointer; border: none; font-weight: 500; }
        .btn-primary { background: #229ED9; color: white; }
        .btn-primary:hover { background: #1a8cc7; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-block { width: 100%; }
        .checkbox-group { display: flex; gap: 20px; align-items: center; }
        .checkbox-group input { width: auto; }
        .tips { background: #e6f7ff; border: 1px solid #91d5ff; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .tips h3 { color: #1890ff; margin-bottom: 8px; font-size: 14px; }
        .tips p { color: #666; font-size: 13px; line-height: 1.6; }
        .tips code { background: #fff; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; }
        .alert-success { background: #f6ffed; color: #237804; border: 1px solid #b7eb8f; }
        .alert-error { background: #fff2f0; color: #a8071a; border: 1px solid #ffccc7; }
        .alert-warning { background: #fffbe6; color: #ad6800; border: 1px solid #ffe58f; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Telegram 一键群发</h1>
        </div>
    </header>
    <div class="container">
        <nav class="nav">
            <a href="/">控制台</a>
            <a href="/accounts">账号管理</a>
            <a href="/search">内容搜索</a>
            <a href="/comments">回复任务</a>
            <a href="/products">产品管理</a>
            <a href="/stats">数据统计</a>
            <a href="/wechat" class="active">微信爬虫</a>
        </nav>

        <div class="card">
            <h2>发送营销消息</h2>

            <div class="tips">
                <h3>使用说明</h3>
                <p>
                    1. Bot Token 格式：<code>123456789:ABCdefGHIjklMNOpqrsTUVwxyz</code><br>
                    2. Chat ID 格式：<code>-1001234567890</code>（负数格式，每行一个）<br>
                    3. 建议先使用"试运行模式"测试，确认无误后再正式发送<br>
                    4. <strong style="color:#ff4d4f;">安全提示：群组标题包含 {{ blacklist_keywords|join('、') }} 的群组将被自动跳过，不会发送</strong>
                </p>
            </div>

            <form method="post" action="/telegram/quick/send">
                <div class="form-group">
                    <label>Bot Token *</label>
                    <input type="text" name="bot_token" placeholder="请输入 Telegram Bot Token，例如：123456789:ABCdefGHIjklMNOpqrsTUVwxyz" required>
                </div>

                <div class="form-group">
                    <label>消息内容 *</label>
                    <textarea name="message" placeholder="请输入要发送的消息内容...

支持 Markdown 格式：
**粗体**
*斜体*
`代码`" required></textarea>
                </div>

                <div class="form-group">
                    <label>群组 Chat ID 列表 *（每行一个）</label>
                    <textarea name="groups_text" placeholder="-1001234567890
-1001234567891
-1001234567892" style="min-height: 120px;" required></textarea>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" name="dry_run" value="1" style="width:auto;">
                        试运行模式（不真正发送消息）
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block" onclick="return confirm('确认开始发送?');">开始发送</button>
            </form>
        </div>

        <div class="card">
            <h2>快速复制示例</h2>
            <p style="color:#666;font-size:14px;margin-bottom:12px;">点击下方按钮快速填充示例数据</p>
            <button type="button" class="btn btn-secondary" onclick="fillExample()">填充示例</button>
        </div>
    </div>

    <script>
        function fillExample() {
            document.querySelector('input[name="bot_token"]').value = 'YOUR_BOT_TOKEN_HERE';
            document.querySelector('textarea[name="message"]').value = '【产品推广】

您好！我想向您介绍我们的产品...

💰 价格：咨询请私信
📱 微信：请私信

有意向的朋友可以私信了解详情！';
            document.querySelector('textarea[name="groups_text"]').value = '-1001234567890\n-1001234567891\n-1001234567892';
        }
    </script>
</body>
</html>
